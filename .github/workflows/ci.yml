name: CI

on:
   push:
      branches:
         - "**"

jobs:
   build:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6
         - uses: pnpm/action-setup@v6
           with:
              version: 9
         - uses: actions/setup-node@v6
           with:
              node-version: 20.x
              cache: "pnpm"

         - run: pnpm install --frozen-lockfile
         - run: pnpm run lint && pnpm run build
